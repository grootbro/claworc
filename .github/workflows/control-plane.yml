name: Control Plane

on:
  push:
    paths:
      - 'control-plane/**'
      - '.github/workflows/control-plane.yml'

env:
  IMAGE_NAMESPACE: ${{ vars.DOCKER_IMAGE_NAMESPACE != '' && vars.DOCKER_IMAGE_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
  VITE_PRODUCT_NAME: ${{ vars.VITE_PRODUCT_NAME != '' && vars.VITE_PRODUCT_NAME || 'Claworc' }}
  VITE_PRODUCT_SHORT_NAME: ${{ vars.VITE_PRODUCT_SHORT_NAME != '' && vars.VITE_PRODUCT_SHORT_NAME || vars.VITE_PRODUCT_NAME || 'Claworc' }}
  VITE_PRODUCT_TAGLINE: ${{ vars.VITE_PRODUCT_TAGLINE != '' && vars.VITE_PRODUCT_TAGLINE || 'OpenClaw Orchestrator' }}

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Run unit tests
        uses: robherley/go-test-action@v0
        with:
          moduleDirectory: control-plane
          testarguments: ./internal/...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Run integration tests
        uses: robherley/go-test-action@v0
        with:
          moduleDirectory: control-plane
          testarguments: -tags docker_integration -timeout 1200s -count=1 ./internal/handlers/ -run TestIntegration
        env:
          CLAWORC_LLM_GATEWAY_PORT: 40001

  build-amd64:
    name: Build amd64
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: control-plane/
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/claworc:build-amd64
          cache-from: type=gha,scope=control-plane-amd64
          cache-to: type=gha,mode=max,scope=control-plane-amd64

  build-arm64:
    name: Build arm64
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: control-plane/
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/claworc:build-arm64
          cache-from: type=gha,scope=control-plane-arm64
          cache-to: type=gha,mode=max,scope=control-plane-arm64

  push-manifest:
    name: Push Manifest
    if: github.ref == 'refs/heads/main'
    needs: [unit, integration, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${IMAGE_NAMESPACE}/claworc:latest \
            ${IMAGE_NAMESPACE}/claworc:build-amd64 \
            ${IMAGE_NAMESPACE}/claworc:build-arm64
