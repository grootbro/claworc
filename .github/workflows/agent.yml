name: Build and Push Agent Image

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'

env:
  IMAGE_NAMESPACE: ${{ vars.DOCKER_IMAGE_NAMESPACE != '' && vars.DOCKER_IMAGE_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
  OPENCLAW_PACKAGE_SPEC: ${{ vars.OPENCLAW_PACKAGE_SPEC != '' && vars.OPENCLAW_PACKAGE_SPEC || 'openclaw@latest' }}

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install test dependencies
        run: make install-test

      - name: Build, test and push the image
        run: make agent
        env:
          CACHE_ARGS: --cache-from type=gha,scope=agent --cache-to type=gha,mode=max,scope=agent
          OPENCLAW_PACKAGE_SPEC: ${{ env.OPENCLAW_PACKAGE_SPEC }}
