# This is an example. It is recommended to use install.sh or install.ps1 depending on your operating system
services:
  control-plane:
    image: ${DASHBOARD_IMAGE:-glukw/claworc}:${TAG:-latest}
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - claworc-data:/app/data
    environment:
      - CLAWORC_DATA_PATH=/app/data
      - CLAWORC_DEFAULT_CONTAINER_IMAGE=${CLAWORC_DEFAULT_CONTAINER_IMAGE:-glukw/openclaw-vnc-chromium:latest}
    restart: unless-stopped
    networks:
      - claworc

volumes:
  claworc-data:

networks:
  claworc:
    name: claworc   # exact name, no compose project prefix
